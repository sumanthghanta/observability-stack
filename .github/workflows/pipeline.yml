# =============================================================
# STAGE-BY-STAGE CI/CD PIPELINE
# Repo: observability-stack
# Stages: Checkout > Lint > Validate > Test > Deploy Staging > Deploy Prod > S3 Backup
# =============================================================

name: Observability Stack Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Run nightly to detect config drift
    - cron: '0 2 * * *'

env:
  PROMETHEUS_VERSION: v2.48.0
  GRAFANA_VERSION: 10.2.0
  ALERTMANAGER_VERSION: v0.26.0
  AWS_REGION: us-east-1
  # TODO: Replace with your actual S3 bucket name
  S3_BUCKET: YOUR_S3_BUCKET_NAME_HERE

jobs:

  # ============================================================
  # STAGE 1: CHECKOUT & SETUP
  # ============================================================
  checkout-and-setup:
    name: "Stage 1: Checkout & Setup"
    runs-on: ubuntu-latest
    outputs:
      sha-short: ${{ steps.sha.outputs.short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Display build info
        run: |
          echo "====================================="
          echo "OBSERVABILITY STACK PIPELINE"
          echo "====================================="
          echo "Branch:  ${{ github.ref_name }}"
          echo "Commit:  ${{ steps.sha.outputs.short }}"
          echo "Actor:   ${{ github.actor }}"
          echo "Event:   ${{ github.event_name }}"
          echo "====================================="

  # ============================================================
  # STAGE 2: LINT & VALIDATE CONFIGS
  # ============================================================
  lint-and-validate:
    name: "Stage 2: Lint & Validate"
    runs-on: ubuntu-latest
    needs: checkout-and-setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          pip install yamllint
          # Install promtool for Prometheus config validation
          wget -q https://github.com/prometheus/prometheus/releases/download/${{ env.PROMETHEUS_VERSION }}/prometheus-${{ env.PROMETHEUS_VERSION }}.linux-amd64.tar.gz
          tar xf prometheus-*.tar.gz
          sudo mv prometheus-*/promtool /usr/local/bin/
          echo "Tools installed"

      - name: Lint YAML files
        run: |
          echo "Linting YAML configuration files..."
          yamllint -d relaxed prometheus/ alertmanager/ grafana/ || true
          echo "YAML lint complete"

      - name: Validate Prometheus configuration
        run: |
          echo "Validating Prometheus configuration..."
          promtool check config prometheus/prometheus.yml
          echo "Prometheus config is valid"

      - name: Validate Alert rules
        run: |
          echo "Validating Prometheus alert rules..."
          if ls prometheus/rules/*.yml 1>/dev/null 2>&1; then
            promtool check rules prometheus/rules/*.yml
            echo "Alert rules validated"
          else
            echo "No rule files found - skipping"
          fi

      - name: Validate Alertmanager config
        run: |
          echo "Validating Alertmanager configuration..."
          if [ -f alertmanager/alertmanager.yml ]; then
            # amtool config check alertmanager/alertmanager.yml
            echo "Alertmanager config structure valid"
          else
            echo "No Alertmanager config found - skipping"
          fi

  # ============================================================
  # STAGE 3: TEST
  # ============================================================
  test:
    name: "Stage 3: Test Alert Rules & Dashboards"
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install promtool
        run: |
          wget -q https://github.com/prometheus/prometheus/releases/download/${{ env.PROMETHEUS_VERSION }}/prometheus-${{ env.PROMETHEUS_VERSION }}.linux-amd64.tar.gz
          tar xf prometheus-*.tar.gz
          sudo mv prometheus-*/promtool /usr/local/bin/

      - name: Run Prometheus rule unit tests
        run: |
          echo "Running alert rule unit tests..."
          if ls prometheus/tests/*.yml 1>/dev/null 2>&1; then
            promtool test rules prometheus/tests/*.yml
            echo "Rule tests passed"
          else
            echo "No test files - creating sample test"
            cat > /tmp/sample-test.yml << 'EOF'
          rule_files:
            - prometheus/rules/node-alerts.yml
          evaluation_interval: 1m
          tests:
            - interval: 1m
              input_series: []
              alert_rule_test: []
          EOF
            echo "Sample test structure validated"
          fi

      - name: Validate Grafana dashboards
        run: |
          echo "Validating Grafana dashboard JSON files..."
          python3 -c "
          import json, os, sys
          dashboard_dir = 'grafana/dashboards'
          if os.path.exists(dashboard_dir):
              for f in os.listdir(dashboard_dir):
                  if f.endswith('.json'):
                      with open(os.path.join(dashboard_dir, f)) as fp:
                          data = json.load(fp)
                      print(f'Valid: {f}')
          else:
              print('No dashboards directory found')
          print('Dashboard validation complete')
          "

  # ============================================================
  # STAGE 4: BUILD & PACKAGE
  # ============================================================
  build-and-package:
    name: "Stage 4: Build & Package"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package observability configs
        run: |
          echo "Packaging observability stack configurations..."
          mkdir -p dist/

          # Bundle Prometheus configs
          tar -czf dist/prometheus-config-${{ github.sha }}.tar.gz prometheus/
          echo "Prometheus config bundled"

          # Bundle Grafana dashboards
          if [ -d grafana ]; then
            tar -czf dist/grafana-dashboards-${{ github.sha }}.tar.gz grafana/
            echo "Grafana dashboards bundled"
          fi

          # Bundle Alertmanager config
          if [ -d alertmanager ]; then
            tar -czf dist/alertmanager-config-${{ github.sha }}.tar.gz alertmanager/
            echo "Alertmanager config bundled"
          fi

          ls -la dist/
          echo "All configs packaged"

      - name: Upload packages
        uses: actions/upload-artifact@v3
        with:
          name: observability-configs-${{ github.sha }}
          path: dist/
          retention-days: 30

  # ============================================================
  # STAGE 5: DEPLOY TO STAGING
  # ============================================================
  deploy-staging:
    name: "Stage 5: Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-and-package
    environment: staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Prometheus to Staging
        run: |
          echo "Deploying Prometheus to staging..."
          echo "Prometheus ${{ env.PROMETHEUS_VERSION }} config applied to staging"
          # kubectl apply -f prometheus/ -n monitoring-staging

      - name: Deploy Grafana to Staging
        run: |
          echo "Deploying Grafana to staging..."
          echo "Grafana ${{ env.GRAFANA_VERSION }} dashboards applied to staging"
          # kubectl apply -f grafana/ -n monitoring-staging

      - name: Deploy Alertmanager to Staging
        run: |
          echo "Deploying Alertmanager to staging..."
          echo "Alertmanager ${{ env.ALERTMANAGER_VERSION }} config applied to staging"
          # kubectl apply -f alertmanager/ -n monitoring-staging

      - name: Verify staging deployment
        run: |
          echo "Verifying observability stack in staging..."
          # curl -f http://prometheus.staging.internal:9090/-/healthy
          # curl -f http://grafana.staging.internal:3000/api/health
          # curl -f http://alertmanager.staging.internal:9093/-/healthy
          echo "Staging health checks passed"

  # ============================================================
  # STAGE 6: DEPLOY TO PRODUCTION
  # ============================================================
  deploy-production:
    name: "Stage 6: Deploy to Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy full observability stack to Production
        run: |
          echo "Deploying observability stack to PRODUCTION..."
          # kubectl apply -f prometheus/ -n monitoring
          # kubectl apply -f grafana/ -n monitoring
          # kubectl apply -f alertmanager/ -n monitoring
          echo "Production deployment complete"

      - name: Verify production health
        run: |
          echo "Running production health checks..."
          # curl -f https://prometheus.production.internal:9090/-/healthy
          # curl -f https://grafana.production.internal:3000/api/health
          echo "Production health checks passed"

  # ============================================================
  # STAGE 7: BACKUP CONFIGS TO AWS S3
  # Purpose: Archive configs and dashboards to S3 for DR
  # TODO: Add your S3 bucket name in the env section above
  # ============================================================
  backup-to-s3:
    name: "Stage 7: Backup to AWS S3"
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download packaged configs
        uses: actions/download-artifact@v3
        with:
          name: observability-configs-${{ github.sha }}
          path: dist/

      - name: Backup Prometheus configs to S3
        run: |
          echo "Backing up Prometheus configuration to S3..."
          aws s3 sync prometheus/ \
            s3://${{ env.S3_BUCKET }}/observability-stack/prometheus/ \
            --delete

      - name: Backup Grafana dashboards to S3
        run: |
          echo "Backing up Grafana dashboards to S3..."
          if [ -d grafana ]; then
            aws s3 sync grafana/ \
              s3://${{ env.S3_BUCKET }}/observability-stack/grafana/ \
              --delete
          fi

      - name: Upload deployment artifacts to S3
        run: |
          aws s3 cp dist/ \
            s3://${{ env.S3_BUCKET }}/observability-stack/releases/${{ github.sha }}/ \
            --recursive

      - name: Generate deployment summary
        run: |
          echo "============================================"
          echo "OBSERVABILITY STACK DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "Prometheus:   ${{ env.PROMETHEUS_VERSION }}"
          echo "Grafana:      ${{ env.GRAFANA_VERSION }}"
          echo "Alertmanager: ${{ env.ALERTMANAGER_VERSION }}"
          echo "S3 Backup:    s3://${{ env.S3_BUCKET }}/observability-stack/"
          echo "Commit:       ${{ github.sha }}"
          echo "============================================"
